<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故서이초 선생님 온라인 추모관</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Serif KR', serif;
            background-color: #0c0c0c;
            color: #d1d5db;
            margin: 0;
            overflow-x: hidden;
        }

        .main-container {
            width: 85vw;
            margin: 0 auto;
            padding: 60px 0;
        }

        .post-it-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .post-it {
            padding: 25px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
            color: #2d3436;
            transform: rotate(var(--r));
            transition: all 0.3s ease;
            border-radius: 2px;
            position: relative;
        }

        .post-it::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 8px;
            background-color: var(--stripe);
            opacity: 0.8;
        }

        .post-it-text {
            font-weight: 500;
            font-size: 1.05rem;
            line-height: 1.8;
            word-break: keep-all;
            white-space: pre-wrap; 
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .post-it-date {
            font-size: 0.75rem;
            text-align: right;
            opacity: 0.6;
        }

        .color-1 { background-color: #fff9c4; --stripe: #fbc02d; }
        .color-2 { background-color: #fce4ec; --stripe: #f06292; }
        .color-3 { background-color: #e3f2fd; --stripe: #2196f3; }
        .color-4 { background-color: #f1f8e9; --stripe: #4caf50; }
        .color-5 { background-color: #ede7f6; --stripe: #9575cd; }
    </style>
</head>
<body>

    <div class="main-container text-center">
        <header class="mb-12">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-6">故서이초 선생님 온라인 추모관</h1>
            <div class="inline-block px-6 py-2 border border-zinc-800 rounded-full mb-6">
                <p id="total-count" class="text-amber-500 font-bold tracking-widest uppercase text-sm">데이터 로딩 중...</p>
            </div>
            <p class="text-zinc-500 italic text-base">"우리가 당신의 목소리가 되어 잊지 않겠습니다."</p>
        </header>

        <div id="post-it-area" class="post-it-grid"></div>

        <div class="flex justify-center mt-16 pb-20">
            <button onclick="renderRandomPostIts()" class="px-10 py-4 bg-zinc-800 hover:bg-zinc-700 text-white rounded-full transition-all border border-zinc-700 text-sm font-bold tracking-widest">
                다른 메시지 보기 (랜덤)
            </button>
        </div>
    </div>

    <script>
        /**
         * [중요] 아래 대괄호 [ ] 사이에 변환된 수만 개의 데이터를 복사해서 넣으세요.
         */
        const allMessages = [
            /* 여기에 JSON 데이터를 붙여넣으세요 */
            { "text": "부디 그곳에선 행복한 기억만 가지고 편히 쉬시길 바랍니다.", "date": "2023-07-25" },
            { "text": "지켜주지 못해 미안합니다. 잊지 않겠습니다.", "date": "2023-07-18" }
        ];

        window.onload = () => {
            if (allMessages.length > 0) {
                document.getElementById('total-count').innerText = `${allMessages.length.toLocaleString()} HEARTS REGISTERED`;
                renderRandomPostIts();
            }
        };

        function renderRandomPostIts() {
            const area = document.getElementById('post-it-area');
            area.innerHTML = '';
            
            const shuffled = [...allMessages].sort(() => 0.5 - Math.random()).slice(0, 24);
            
            shuffled.forEach(msg => {
                const colorNum = Math.floor(Math.random() * 5) + 1;
                const rotation = (Math.random() * 4 - 2).toFixed(1);
                
                const div = document.createElement('div');
                div.className = `post-it color-${colorNum}`;
                div.style.setProperty('--r', `${rotation}deg`);
                div.innerHTML = `
                    <div class="post-it-text">${msg.text || "내용 없음"}</div>
                    <div class="post-it-date">${msg.date || ""}</div>
                `;
                area.appendChild(div);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
