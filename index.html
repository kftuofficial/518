<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故서이초 선생님 온라인 추모관</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Serif KR', serif;
            background-color: #0c0c0c;
            color: #d1d5db;
            margin: 0;
        }

        .main-container {
            width: 85vw;
            margin: 0 auto;
            padding: 60px 0;
        }

        .post-it-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .post-it {
            padding: 25px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
            color: #2d3436;
            transition: all 0.3s ease;
            border-radius: 2px;
            position: relative;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-it::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 8px;
            background-color: var(--stripe);
            opacity: 0.8;
        }

        .post-it-text {
            font-weight: 500;
            font-size: 1.05rem;
            line-height: 1.8;
            word-break: keep-all;
            white-space: pre-wrap; 
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .post-it-date {
            font-size: 0.75rem;
            text-align: right;
            opacity: 0.6;
        }

        .color-1 { background-color: #fff9c4; --stripe: #fbc02d; }
        .color-2 { background-color: #fce4ec; --stripe: #f06292; }
        .color-3 { background-color: #e3f2fd; --stripe: #2196f3; }
        .color-4 { background-color: #f1f8e9; --stripe: #4caf50; }
        .color-5 { background-color: #ede7f6; --stripe: #9575cd; }

        #loading-trigger {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="main-container text-center">
        <header class="mb-12">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-6">故서이초 선생님 온라인 추모관</h1>
            <div class="inline-block px-6 py-2 border border-zinc-800 rounded-full mb-6">
                <p id="total-count" class="text-amber-500 font-bold tracking-widest uppercase text-sm">데이터 파일을 불러오는 중...</p>
            </div>
            <p class="text-zinc-500 italic text-base">"우리가 당신의 목소리가 되어 잊지 않겠습니다."</p>
        </header>

        <!-- 포스트잇이 배치될 구역 -->
        <div id="post-it-area" class="post-it-grid"></div>

        <!-- 스크롤 감지 및 로딩 표시 -->
        <div id="loading-trigger">
            <span id="loading-msg">메시지를 불러오고 있습니다...</span>
        </div>

        <footer class="mt-20 opacity-30 text-[10px] tracking-[0.6em] pb-10 uppercase">
            REMEMBER 718 ARCHIVE
        </footer>
    </div>

    <script>
        let allMessages = []; // 외부 파일에서 불러온 데이터가 저장될 공간
        let currentIndex = 0;
        const PAGE_SIZE = 40; 
        let isLoading = false;

        // 윈도우 로드 시 외부 JSON 파일을 가져옴
        window.onload = async () => {
            try {
                // [참고] 데이터 파일명이 messages.json 이라고 가정합니다.
                // 파일명이 다르다면 아래 이름을 실제 파일명으로 바꿔주세요.
                const response = await fetch('messages.json');
                if (!response.ok) throw new Error('데이터 파일을 찾을 수 없습니다.');
                
                allMessages = await response.json();

                if (Array.isArray(allMessages) && allMessages.length > 0) {
                    document.getElementById('total-count').innerText = `${allMessages.length.toLocaleString()} HEARTS REGISTERED`;
                    loadMoreMessages(); 
                    setupInfiniteScroll();
                } else {
                    document.getElementById('total-count').innerText = "데이터가 비어있습니다.";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('total-count').innerText = "데이터 로딩 오류";
                document.getElementById('loading-msg').innerText = "데이터 파일을 불러오는데 실패했습니다 (JSON 파일 확인 필요)";
            }
        };

        function loadMoreMessages() {
            if (isLoading || currentIndex >= allMessages.length) {
                if (currentIndex >= allMessages.length && allMessages.length > 0) {
                    document.getElementById('loading-msg').innerText = "모든 기록을 확인했습니다.";
                }
                return;
            }

            isLoading = true;
            const area = document.getElementById('post-it-area');
            const fragment = document.createDocumentFragment();
            
            const nextBatch = allMessages.slice(currentIndex, currentIndex + PAGE_SIZE);
            
            nextBatch.forEach((msg, i) => {
                const colorNum = (currentIndex + i) % 5 + 1; 
                const rotation = (Math.random() * 3 - 1.5).toFixed(1); 
                
                const content = msg.text || msg.content || "추모 메시지";
                const date = msg.date || "";

                const div = document.createElement('div');
                div.className = `post-it color-${colorNum}`;
                div.style.setProperty('--r', `${rotation}deg`);
                div.innerHTML = `
                    <div class="post-it-text">${content}</div>
                    <div class="post-it-date">${date}</div>
                `;
                fragment.appendChild(div);
            });

            area.appendChild(fragment);
            currentIndex += PAGE_SIZE;
            isLoading = false;
        }

        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    loadMoreMessages();
                }
            }, { threshold: 0.1 });

            observer.observe(document.getElementById('loading-trigger'));
        }
    </script>
</body>
</html>
